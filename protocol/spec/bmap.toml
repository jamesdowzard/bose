# BMAP protocol spec — single source of truth for the Bose QC Ultra 2 wire layer.
#
# Transcribed from the repo CLAUDE.md ("All Settable Commands", "BMAP Function
# IDs", "BMAP Operators", "Transport & Operators", "connectDevice Behaviour").
# Bytes here are reverse-engineered captures — do NOT invent bytes/operators.
#
# Frame layout: [block, function, operator, length, ...payload]
#
# Each command has one or more *action* sub-tables (e.g. [commands.x.set]) that
# carry `operator` (BMAP operator enum name) and `payload` (encoder-DSL tokens:
# "name:u8" | "name:i8" | "name:mac" | hex literal like "0x01" / "00").
#
# `verified_bytes` locks a concrete capture: each key is "<action>_<variant>" and
# its value is the exact frame the device accepts. `test_args` supplies the named
# args for each verified label. The golden test (tests/test_golden.py) iterates
# these and asserts the generated frame equals the captured bytes.

# ── Enums ──────────────────────────────────────────────────────────────────────

[enums.AncMode]
# ANC mode (1F,03). Hardware slots (QC Ultra 2, fw 8.2.20, verified live #88/#91):
#   0=quiet 1=aware 2=immersion 3=cinema  (all fixed-level)
#   4=custom1 5=custom2                   (the adjustable "None" slots; 1F,06/anc-level)
# Earlier the enum mislabelled slots 2/3 as the customs; #91 confirmed 2=Immersion,
# 3=Cinema, and the real adjustable custom slots are 4/5.
# 255 (0xFF) is the disabled/off sentinel the QC Ultra 2 reports when ANC is off
# (observed on-device at depth 0). Decode-only — renders reads as "off" instead of
# "unknown(255)"; NOT offered as a settable mode (setting 0xFF is unverified).
quiet = 0
aware = 1
immersion = 2
cinema = 3
custom1 = 4
custom2 = 5
off = 255

[enums.EqBand]
# EQ band selector (01,07). CLAUDE.md: 0=bass 1=mid 2=treble
bass = 0
mid = 1
treble = 2

[enums.MediaAction]
# Media transport (05,03). CLAUDE.md: 01=play 02=pause 03=next 04=prev
play = 1
pause = 2
next = 3
prev = 4


# ── Block 0x1F — ANC / CNC ─────────────────────────────────────────────────────

[commands.anc_mode]
block = 0x1F
function = 0x03
summary = "Set/get active-noise-cancellation mode (quiet/aware/immersion/cinema/custom1/custom2)."
enum = "AncMode"

[commands.anc_mode.set]
operator = "START"          # CLAUDE.md: ANC mode uses START
payload = ["mode:u8", "0x01"]

[commands.anc_mode.get]
operator = "GET"
payload = []

[commands.anc_mode.verified_bytes]
# `1F,03,05,02,{mode},01` — slot indices verified live on verBosita (#91).
set_quiet = "1F 03 05 02 00 01"
set_aware = "1F 03 05 02 01 01"
set_immersion = "1F 03 05 02 02 01"
set_cinema = "1F 03 05 02 03 01"
set_custom1 = "1F 03 05 02 04 01"
set_custom2 = "1F 03 05 02 05 01"
get = "1F 03 01 00"

[commands.anc_mode.test_args]
set_quiet = { mode = 0 }
set_aware = { mode = 1 }
set_immersion = { mode = 2 }
set_cinema = { mode = 3 }
set_custom1 = { mode = 4 }
set_custom2 = { mode = 5 }
get = {}

# ANC depth (1F,0A, SET_GET) is a composite: read current state first, change
# `level` (0-10), preserve autoCNC/spatial/windBlock/ancToggle. Hand-written
# per-platform read-modify-write — NOT a plain builder.
# ─────────────────────────────────────────────────────────────────────────────
# AudioModes level/spatial: the SHIPPING command is 1F,06 — and it is deliberately
# NOT in this file. Read this before adding anything to block 0x1F.
#
# `1F,06` AudioModesModeConfig carries a 48-byte GET payload and a DIFFERENT 40-byte
# SET_GET payload (offset tables in CLAUDE.md). This DSL can't express either, so the
# 1F,06 read-modify-write that backs `bose anc-level`, `bose spatial` and
# `bose mode-name` is hand-written per platform:
#     Swift  — cli/Parsers.swift    parseModeConfig / buildModeConfigSet
#     Kotlin — android/.../Parsers.kt  (same names, same captured-byte corpus)
#
# CONSEQUENCE: 1F,06 is the ONE place the two clients CAN drift on wire encoding,
# because codegen doesn't cover it. `make check` cannot catch a divergence here.
# If you change either side, change both and keep the byte tests in lockstep.
# ─────────────────────────────────────────────────────────────────────────────

# ⚠ DO NOT USE — kept only so its block/func is documented and never re-derived.
# This is NOT the noise-level command; `bose anc-level` uses 1F,06 (see the note above).
[commands.cnc_level]
block = 0x1F
function = 0x0A
composite = true
deprecated = true
summary = "⚠ DO NOT WRITE (#83) — global CNC live-tuning; writing it DETACHES the active mode and disables ANC. The real level command is the 1F,06 RMW. Read-only: getAllState issues a 1F,0A GET for the current depth, which is harmless."
# `1F,0A,02,05,{level},{autoCNC},{spatial},{windBlock},{ancToggle}` — SET_GET.
# No verified_bytes: the payload depends on a prior read of live device state.
# DANGER (#83, confirmed audibly fw 8.2.20): CNC depth is the SAME axis as the named
# ANC mode (1F,03). Writing a raw depth over a named mode (quiet/aware) knocks 1F,03
# to 0xFF (255 = genuinely OFF — ANC stops cancelling; the `ancToggle` byte still
# reads 1 but is NOT the real radio state). So depth is only meaningful inside a
# CUSTOM mode (custom1/custom2). Never write depth alongside quiet/aware — profiles
# and the macOS app enforce this (named mode → mode only).

[commands.favorites]
block = 0x1F
function = 0x08
summary = "Which AudioModes slots are marked favourite (count + reversed-order bitmask)."
# GET-verified live on verBosita (fw 8.2.20): `1F 08 01 00` → STATUS
# `1f 08 03 03 0b 00 07` = count 0x0b (11 slots) + 2-byte bitmask `00 07`, where the
# LOW modes land in the LAST byte (reversed byte order): 0x07 = bits 0,1,2 = modes
# 0/1/2 (Quiet/Aware/Immersion) favourited.
#
# Modelled like `device_info` (NOT composite): the GET request is a clean generated
# builder (`BMAP.favoritesGet()`), and only the SET_GET payload build + the response
# decode are hand-written per-platform — because the SET_GET payload is COMPUTED
# (count + reversed bitmask), which the fixed-token encoder DSL can't express. Those
# live as pure functions in Parsers (`buildFavoritesSetGet` / `parseFavorites`,
# Swift + Kotlin) tested against the live capture below.
#
# SET_GET frame (from the app's `AudioModesFavoritesSetGetPacket(count, modes[])`,
# jadx): payload[0] = count; payload length = ceil(count/8)+1; for each favourite
# mode d set bit (d % 8) in byte `(len - floor(d/8) - 1)`. The no-op restore that
# re-creates the live state is `1F 08 02 03 0b 00 07` (count 11, modes {0,1,2}) —
# captured live (STATUS echo unchanged).

[commands.favorites.get]
operator = "GET"
payload = []

[commands.favorites.verified_bytes]
# Only the GET request is a generated golden; the SET_GET bitmask is covered by the
# Parsers byte tests (cli/Tests + Android test corpus), not here.
get = "1F 08 01 00"

[commands.favorites.test_args]
get = {}


# ── Block 0x01 — Settings / Device ─────────────────────────────────────────────

[commands.device_name]
block = 0x01
function = 0x02
summary = "Rename the headphones (max 30 UTF-8 bytes)."
# `01,02,06,{len},00,{utf8}` — SET. Length-prefixed UTF-8 string; the u8/i8/mac
# encoder DSL can't express a variable-length string payload, so no verified_bytes
# is locked here (the byte row is structural, not a fixed capture).

[commands.device_name.set]
operator = "SET"            # CLAUDE.md: name uses plain SET (0x06)
payload = []                # variable UTF-8 body assembled by the platform layer

[commands.eq_band]
block = 0x01
function = 0x07
summary = "Set/get a 3-band EQ value (bass/mid/treble), signed -10..+10."
enum = "EqBand"

[commands.eq_band.set]
operator = "SET_GET"        # CLAUDE.md: EQ REQUIRES SET_GET (0x02), not SET
payload = ["value:i8", "band:u8"]

[commands.eq_band.get]
operator = "GET"
payload = []

[commands.eq_band.verified_bytes]
# `01,07,02,02,{value},{band}` — value signed two's-complement byte
set_bass_plus3 = "01 07 02 02 03 00"
set_mid_zero = "01 07 02 02 00 01"
set_treble_minus3 = "01 07 02 02 FD 02"
get = "01 07 01 00"

[commands.eq_band.test_args]
set_bass_plus3 = { value = 3, band = 0 }
set_mid_zero = { value = 0, band = 1 }
set_treble_minus3 = { value = -3, band = 2 }
get = {}

[commands.multipoint]
block = 0x01
function = 0x0A
# SET sends 07=on / 00=off. The RESPONSE state byte is a bitfield: bit 0 is the live
# enable flag; higher bits are slot/capability bits the firmware retains. Verified
# live on fw 8.2.20: on -> 0x07, off -> 0x06 (NOT 0x00 — slot bits persist). Parse the
# enable bit (`& 0x01`), never `!= 0` — that misread 0x06 as "on" (#83).
summary = "Toggle 2-device multipoint (SET 07=on/00=off; RESP enable bit: 0x07=on, 0x06=off)."

[commands.multipoint.set]
operator = "SET_GET"        # CLAUDE.md: multipoint REQUIRES SET_GET (0x02)
payload = ["state:u8"]      # state: 0x07=on, 0x00=off

[commands.multipoint.get]
operator = "GET"
payload = []

[commands.multipoint.verified_bytes]
# `01,0A,02,01,{07/00}`
set_on = "01 0A 02 01 07"
set_off = "01 0A 02 01 00"
get = "01 0A 01 00"

[commands.multipoint.test_args]
set_on = { state = 7 }
set_off = { state = 0 }
get = {}

[commands.auto_play_pause]
block = 0x01
function = 0x18
# Pause playback when the headphones are removed / resume when re-donned. This is the
# on-device *setting toggle* (01,18) — distinct from the live wear STATE (02,09,
# StatusInEar) which is FuncNotSupp on the over-ears. GET-verified live on verBosita
# (fw 8.2.20). SET_GET is a single bool byte, confirmed two ways: the Bose Music app's
# `SettingsAutoPlayPauseSetGetPacket(bool)` builder (jadx) emits `new byte[]{0|1}`, and
# a live no-op SET_GET (re-sending the current ON value) echoed STATUS unchanged.
summary = "Toggle auto-pause when headphones are removed (SET_GET 00=off/01=on)."

[commands.auto_play_pause.set]
operator = "SET_GET"        # app builder uses SetGet (0x02); plain SET is auth-gated
payload = ["enabled:u8"]    # 0x00 = off, 0x01 = on

[commands.auto_play_pause.get]
operator = "GET"
payload = []

[commands.auto_play_pause.verified_bytes]
# `01,18,02,01,{00/01}` — set_on captured live (no-op re-send, STATUS echo 01 18 03 01 01);
# set_off matches the app builder (not toggled on-device to avoid changing state).
set_on = "01 18 02 01 01"
set_off = "01 18 02 01 00"
get = "01 18 01 00"

[commands.auto_play_pause.test_args]
set_on = { enabled = 1 }
set_off = { enabled = 0 }
get = {}

[commands.auto_answer]
block = 0x01
function = 0x1B
# Auto-answer an incoming call when the headphones are donned. GET-verified live on
# verBosita (fw 8.2.20). SET_GET single bool byte — confirmed via the app's
# `SettingsAutoAnswerSetGetPacket(bool)` builder (`new byte[]{0|1}`) and a live no-op
# SET_GET that echoed STATUS unchanged.
summary = "Toggle auto-answer when headphones are donned (SET_GET 00=off/01=on)."

[commands.auto_answer.set]
operator = "SET_GET"
payload = ["enabled:u8"]    # 0x00 = off, 0x01 = on

[commands.auto_answer.get]
operator = "GET"
payload = []

[commands.auto_answer.verified_bytes]
# `01,1B,02,01,{00/01}` — set_on captured live (no-op re-send, STATUS echo 01 1b 03 01 01);
# set_off matches the app builder.
set_on = "01 1B 02 01 01"
set_off = "01 1B 02 01 00"
get = "01 1B 01 00"

[commands.auto_answer.test_args]
set_on = { enabled = 1 }
set_off = { enabled = 0 }
get = {}


# ── Block 0x04 — DeviceManagement ──────────────────────────────────────────────

[commands.connect_device]
block = 0x04
function = 0x01
summary = "Connect/page a device and route audio to it. ACK != success — poll connected_devices."
# Payload: `00` + 6-byte MAC = 7 bytes.

[commands.connect_device.connect]
operator = "START"          # CLAUDE.md: connect uses START
payload = ["00", "mac:mac"]

[commands.connect_device.verified_bytes]
# `04,01,05,07,00,{MAC}` — mac device from device map (BC:D0:74:11:DB:27)
connect_mac = "04 01 05 07 00 BC D0 74 11 DB 27"
# appletv (Katrina's Apple TV) — 48:E1:5C:5D:33:B6
connect_appletv = "04 01 05 07 00 48 E1 5C 5D 33 B6"

[commands.connect_device.test_args]
connect_mac = { mac = "BC:D0:74:11:DB:27" }
connect_appletv = { mac = "48:E1:5C:5D:33:B6" }

[commands.disconnect_device]
block = 0x04
function = 0x02
summary = "Disconnect a device (6-byte MAC payload)."

[commands.disconnect_device.disconnect]
operator = "START"          # CLAUDE.md: disconnect uses START
payload = ["mac:mac"]

[commands.disconnect_device.verified_bytes]
# `04,02,05,06,{MAC}`
disconnect_mac = "04 02 05 06 BC D0 74 11 DB 27"

[commands.disconnect_device.test_args]
disconnect_mac = { mac = "BC:D0:74:11:DB:27" }

[commands.list_devices]
block = 0x04
function = 0x04
summary = "GET the headphones' OWN paired-device table. Ground truth for 'is this device even paired?' — distinct from the host-side devices.toml map, which drifts."
# Response `04,04,03,<len>,<capacity>,{6-byte MAC}*`; capacity byte = 0x10 (16 slots).
# Decoded by the hand-written parsePairedDevices (variable-length list, like
# connected_devices), so the response side is NOT codegen'd — only the request is.

[commands.list_devices.get]
operator = "GET"
payload = []

[commands.list_devices.verified_bytes]
# `04,04,01,00` — captured live 2026-07-20, fw 8.2.20. Response held 6 MACs:
# phone, quest, audikast, ipad, mac, iphone (tv + appletv were ABSENT).
get = "04 04 01 00"

[commands.device_info]
block = 0x04
function = 0x05
summary = "GET per-device info (ACL state). Status byte unreliable for AUDIO routing — cross-ref connected_devices; reliable only for ACL presence."
# Request `04,05,01,06,{MAC}` is a clean generated GET+MAC builder (like eq_band.get).
# Only the variable-length response decode (status byte + name) is hand-written
# per-platform, so this is NOT marked composite.

[commands.device_info.get]
operator = "GET"
payload = ["mac:mac"]

[commands.device_info.verified_bytes]
# `04,05,01,06,{MAC}` — mac device from device map (BC:D0:74:11:DB:27)
get_mac = "04 05 01 06 BC D0 74 11 DB 27"

[commands.device_info.test_args]
get_mac = { mac = "BC:D0:74:11:DB:27" }


# ── Block 0x05 — Audio ─────────────────────────────────────────────────────────

[commands.connected_devices]
block = 0x05
function = 0x01
composite = true
summary = "GET audio-active device MACs (ground truth). Response parse is hand-written per-platform."
# GET returns a variable-length list of MACs — composite (response parser is
# platform-specific). No fixed verified_bytes for the response body.

[commands.media_control]
block = 0x05
function = 0x03
summary = "Media transport: play/pause/next/prev."
enum = "MediaAction"

[commands.media_control.media]
operator = "START"          # CLAUDE.md: media control uses START
payload = ["action:u8"]

[commands.media_control.verified_bytes]
# `05,03,05,01,{action}`
media_play = "05 03 05 01 01"
media_pause = "05 03 05 01 02"
media_next = "05 03 05 01 03"
media_prev = "05 03 05 01 04"

[commands.media_control.test_args]
media_play = { action = 1 }
media_pause = { action = 2 }
media_next = { action = 3 }
media_prev = { action = 4 }

[commands.audio_codec]
block = 0x05
function = 0x04
summary = "GET codec ID + bitrate."

[commands.audio_codec.get]
operator = "GET"
payload = []

[commands.audio_codec.verified_bytes]
get = "05 04 01 00"

[commands.audio_codec.test_args]
get = {}

[commands.volume]
block = 0x05
function = 0x05
summary = "Set/get volume level 0-31. MUST use SET_GET (0x02) — SET (0x06) is silently broken (v1 bug)."

[commands.volume.set]
operator = "SET_GET"        # CRITICAL: SET_GET, not SET. Fixes the v1 setVolume bug.
payload = ["level:u8"]

[commands.volume.get]
operator = "GET"
payload = []

[commands.volume.verified_bytes]
# `05,05,02,01,{level}` — note operator 02 (SET_GET), proving the v1-bug fix
set_15 = "05 05 02 01 0F"
set_0 = "05 05 02 01 00"
set_31 = "05 05 02 01 1F"
get = "05 05 01 00"

[commands.volume.test_args]
set_15 = { level = 15 }
set_0 = { level = 0 }
set_31 = { level = 31 }
get = {}


# ── Block 0x00 — System ────────────────────────────────────────────────────────

[commands.firmware]
block = 0x00
function = 0x05
summary = "GET firmware version."

[commands.firmware.get]
operator = "GET"
payload = []

[commands.firmware.verified_bytes]
get = "00 05 01 00"

[commands.firmware.test_args]
get = {}


