[commands.battery]
block = 0x02
function = 0x02
summary = "GET battery level."

[commands.battery.get]
operator = "GET"
payload = []

[commands.battery.verified_bytes]
get = "02 02 01 00"

[commands.battery.test_args]
get = {}
